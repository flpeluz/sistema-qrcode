<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ projeto.titulo }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-12"> 
    <div class="bg-red-800 text-white text-center py-10 px-4 shadow-lg mb-6">
        <img src="{{ url_for('static', filename='cb.png') }}" 
             alt="Logo" 
             class="h-16 mx-auto mb-4 object-contain">
        <p class="text-xs uppercase tracking-widest text-white/80 mb-2">15°GB - 3°SGB</p>
        <h1 class="text-3xl font-extrabold">{{ projeto.titulo }}</h1>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <div class="mb-8 text-center">
            <p class="text-sm uppercase tracking-widest text-gray-500 font-bold mb-4">
                {{ projeto.subtitulo_agente }}
            </p>
            <div class="grid grid-cols-1 gap-4">
                {% for link in projeto.links %}
                <a href="{{ link.url }}" target="_blank" class="block w-full bg-white border-2 border-red-800 text-red-800 hover:bg-red-800 hover:text-white transition-all text-center py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95">
                    {{ link.texto }}
                </a>
                {% endfor %}
            </div>
        </div>

        <div class="bg-white p-1.5 rounded-2xl shadow-2xl overflow-hidden">
            <div class="aspect-video w-full bg-gray-200 rounded-xl overflow-hidden">
                <iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/{{ projeto.video_id }}?rel=0" frameborder="0" allowfullscreen loading="lazy"></iframe>
            </div>
            <div class="p-5">
                <p class="text-gray-600 text-sm text-center italic leading-relaxed">{{ projeto.descricao_video }}</p>
            </div>
        </div>
    </div> 
</body>
</html>
