<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ projeto.titulo }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-12"> 
    
    <div class="bg-red-800 text-white text-center py-10 px-4 shadow-lg mb-6">
        <p class="text-[10px] md:text-xs uppercase tracking-[0.2em] mb-3 font-bold opacity-80">15°GB - 3° SGB</p>
        <h1 class="text-2xl md:text-4xl font-extrabold mb-3 leading-tight">{{ projeto.titulo }}</h1>
        <p class="text-sm md:text-lg opacity-90 font-light">Assista ao vídeo de orientação abaixo.</p>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        
        {% if projeto.texto_botao %}
        <a href="{{ projeto.link_acao }}" target="_blank" class="block w-full bg-white border-2 border-red-800 text-red-800 hover:bg-red-800 hover:text-white transition-all text-center py-4 rounded-xl font-bold text-lg md:text-xl shadow-xl mb-8 active:scale-95">
            {{ projeto.texto_botao }}
        </a>
        {% endif %}

        <div class="bg-white p-1.5 rounded-2xl shadow-2xl overflow-hidden">
            <div class="aspect-video w-full bg-gray-200 rounded-xl overflow-hidden">
                <iframe 
                    class="w-full h-full"
                    src="https://www.youtube-nocookie.com/embed/{{ projeto.video_id }}?rel=0&modestbranding=1&showinfo=0" 
                    title="{{ projeto.titulo }}" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen
                    loading="lazy">
                </iframe>
            </div>
            
            <div class="p-5">
                <p class="text-gray-600 text-sm text-center italic leading-relaxed">
                    {{ projeto.descricao_video }}
                </p>
            </div>
        </div>

        <p class="mt-10 text-center text-[10px] text-gray-400 uppercase tracking-[0.3em] font-medium">
            © 2026 Sistema de Orientação - CBPMESP
        </p>
    </div> 
</body>
</html>
